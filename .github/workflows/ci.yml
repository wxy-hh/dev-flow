name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npx --yes @anthropic-ai/claude-code plugin validate .
      - run: npx --yes @anthropic-ai/claude-code plugin validate ./plugins/dev-flow --strict
